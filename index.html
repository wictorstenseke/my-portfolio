<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fcfcfc" />
    <meta
      name="description"
      content="Wictor Stenseke — UX Designer in Gothenburg, Sweden."
    />
    <link rel="icon" href="/favicon.ico" />
    <title>Wictor Stenseke — UX Designer</title>
    <script>
      // Set theme before first paint to avoid flash. localStorage can
      // throw in some private/lockdown modes — never block the page on it.
      (() => {
        var t = null;
        try {
          t = localStorage.getItem("theme");
        } catch {}
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
