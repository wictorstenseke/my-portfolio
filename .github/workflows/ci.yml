name: CI & Deploy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      # build includes tsc --noEmit
      - run: npm run build
      # cache browser binaries; `install` skips downloads on a warm cache and
      # only installs the apt deps webkit needs on the runner
      - run: echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_ENV"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}
      - run: npx playwright install --with-deps chromium webkit
      - run: npm test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      # stage the tested build for the deploy job (push to main only)
      - run: cp -r archive dist/archive
        if: github.event_name == 'push'
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name == 'push'
        with:
          path: dist

  # deploys the exact artifact the tests ran against — never builds twice
  deploy:
    if: github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - id: deployment
        uses: actions/deploy-pages@v5
