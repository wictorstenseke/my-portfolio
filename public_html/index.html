<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Välkommen att kontakta mig via LinkedIn eller Facebook!">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wictor Stenseke | UX &amp; Web Designer</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,700" rel="stylesheet">
  <style>
    body {
      margin: 0px;
      padding: 0px;
      background-color: #08394B;
      background-image: url(background.svg);
      background-size: 450px 450px;
      background-position: center center;
      font-family: 'Lato', sans-serif;
    }
    .one-page {
      height: 100vh;
      width: 100vw;
      position: relative;
    }
    .header {
      margin: 0 auto;
      padding: 50px;
      max-width: 660px;
      text-align: center;
      background-color: rgba(5,36,48,0.5);
      border-radius: 10px;
      box-shadow: 0px 5px 6px rgba(0,0,0,0.2);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    h1 {
      margin: 5px 0;
      color: #fff;
      text-transform: uppercase;
      font-size: 50px;
      filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.2));
    }
    h2 {
     margin: 5px 0;
     color: #fff;
     text-transform: uppercase;
     font-size: 30px;
     filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.2));
    }
    p {
      color: rgba(255,255,255,0.6);
      margin: 20px 0px 30px 0;
    }
    .button {
      display: block;
      margin: 20px auto;
      max-width: 100px;
      background: rgba(196,196,196,0.10);
      border: 1px solid #fff;
      border-radius: 50px;
      padding: 10px 35px;
      font-weight: 300;
      text-decoration: none;
      color: #fff;
      transition: all 0.2s ease-in-out;
    }
    .button:hover {
      background: rgba(196,196,196,0.25);
    }

    @media screen and (max-width: 414px) {
      .one-page {
        padding: 30px;
      }
      .button {
        margin: 20px 15px;
        display: block;
      }
      h1 {
        font-size: 45px;
      }
      h2 {
        font-size: 25px;
      }
  </style>
</head>
<body>

  <section class="one-page">
    <div class="header">
      <h1>Wictor Stenseke</h1>
      <h2>UX &amp; Web Designer</h2>
      <p>For contact look me up on LinkedIn or Facebook.</p>
      <a href="https://se.linkedin.com/in/wictorstenseke" class="button">LinkedIn</a>
      <a href="https://www.facebook.com/wictorj" class="button">Facebook</a>
    </div>
  </section>

</body>
</html>
